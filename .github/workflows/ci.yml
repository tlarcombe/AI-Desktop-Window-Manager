name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aidwm tests

      - name: Type check
        run: mypy aidwm

      - name: Test
        # X11 tests need a display — use Xvfb for the backend tests
        # Pure-logic tests (planner, registry, config) run without it
        run: pytest tests/ -k "not x11" --cov=aidwm --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
